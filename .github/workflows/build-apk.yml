name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies
        run: npm install

      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp www/index.html android/app/src/main/assets/public/index.html

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -o android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradle/wrapper/gradle-wrapper.jar

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/release.keystore \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Dolby Player, OU=App, O=DolbyPlayer, L=Unknown, S=Unknown, C=US"

      - name: Generate app icons from source
        run: |
          mkdir -p android/app/src/main/res/drawable
          curl -L "https://drive.google.com/uc?export=download&id=1JftyBNBUgVQ3n-QOq7lz7GqllsB4iB8A" \
            -o android/app/src/main/res/drawable/ic_launcher_source.png
          SRC="android/app/src/main/res/drawable/ic_launcher_source.png"
          declare -A sizes=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          for dpi in "${!sizes[@]}"; do
            size="${sizes[$dpi]}"
            mkdir -p "android/app/src/main/res/$dpi"
            convert "$SRC" -resize "${size}x${size}" "android/app/src/main/res/$dpi/ic_launcher.png"
            convert "$SRC" -resize "${size}x${size}" -alpha set \
              \( +clone -threshold 50% -negate -morphology Erode Disk:$((size/2)) \) \
              -compose DstIn -composite \
              "android/app/src/main/res/$dpi/ic_launcher_round.png"
          done

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dolby-player-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30