name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          if [ -f "www/index.html" ]; then
            echo "www/index.html already exists, skipping copy"
          else
            HTML=$(find . -maxdepth 3 -name "*.html" ! -path "*/node_modules/*" ! -path "*/android/*" ! -path "*/www/*" | head -n 1)
            if [ -z "$HTML" ]; then
              echo "ERROR: No HTML file found in repo"
              exit 1
            fi
            echo "Found HTML: $HTML"
            cp "$HTML" www/index.html
          fi
          for f in manifest.json sw.js icon-512.png; do
            FOUND=$(find . -maxdepth 3 -name "$f" ! -path "*/node_modules/*" ! -path "*/android/*" ! -path "*/www/*" | head -n 1)
            [ -n "$FOUND" ] && cp "$FOUND" www/ || true
          done

      - name: Setup Capacitor Android
        run: |
          # Always remove stale android folder and rebuild fresh
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Fix Gradle wrapper
        run: |
          cd android
          # Download the gradle wrapper jar if missing
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dolby-player-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30